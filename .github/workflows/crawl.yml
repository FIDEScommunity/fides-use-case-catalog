name: Crawl

# Push primary: WordPress commits data/wp-export/use-case.json via the GitHub
# Contents API on publish/delete/save; that push triggers this crawl, which reads
# the committed export locally (no ~65 KB repository_dispatch cap, no WAF).
# repository_dispatch (inline JSON) and workflow_dispatch (HTTP pull) remain as
# fallback/recovery. Re-aggregate on community-catalog commits without calling
# WordPress. See fides-community-tools-tiles governance §14.1.

on:
  repository_dispatch:
    types: [fides-catalog-export]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/wp-export/use-case.json'
      - 'community-catalogs/**/use-case-catalog.json'

jobs:
  crawl:
    if: github.repository == 'FIDEScommunity/fides-use-case-catalog'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Crawl (inline export on dispatch; recovery pull on manual run)
        env:
          USE_CASE_EXPORT_JSON: ${{ github.event.client_payload.export_json }}
          USE_CASE_EXPORT_URL: ${{ vars.USE_CASE_EXPORT_URL }}
        run: npm run crawl

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain community-catalogs/ data/ wordpress-plugin/fides-use-case-catalog/data/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit."
          fi

      - name: Commit published use cases + aggregated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community-catalogs/ data/aggregated.json wordpress-plugin/fides-use-case-catalog/data/aggregated.json
          git commit -m "chore: publish use cases + update aggregated data [skip ci]"
          git push
